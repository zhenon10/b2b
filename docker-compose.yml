services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    volumes:
      - b2b_mssql:/var/opt/mssql
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: B2B.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__SqlServer: ${CONNECTIONSTRINGS__SQLSERVER}
      Jwt__SigningKey: ${JWT__SIGNINGKEY}
      ObjectStorage__Provider: Local
    ports:
      - "8080:8080"
    volumes:
      - b2b_uploads:/app/wwwroot/uploads
    depends_on:
      - db
    restart: unless-stopped

volumes:
  b2b_mssql:
  b2b_uploads:

