services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    volumes:
      - b2b_mssql:/var/opt/mssql
      - ./backups:/backups
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: B2B.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__SqlServer: ${CONNECTIONSTRINGS__SQLSERVER}
      Jwt__SigningKey: ${JWT__SIGNINGKEY}
      Auth__AllowPublicRegistration: ${AUTH__ALLOWPUBLICREGISTRATION:-false}
      Auth__AllowPublicRegistrationInProduction: ${AUTH__ALLOWPUBLICREGISTRATIONINPRODUCTION:-false}
      Auth__AutoApproveRegisteredDealers: ${AUTH__AUTOAPPROVEREGISTEREDDEALERS:-false}
      ObjectStorage__Provider: ${OBJECTSTORAGE__PROVIDER:-Local}
      ObjectStorage__PublicBaseUrl: ${OBJECTSTORAGE__PUBLICBASEURL:-}
      Api__PublicBaseUrl: ${API__PUBLICBASEURL:-}
      Cors__AllowedOrigins__0: ${CORS__ALLOWEDORIGINS__0:-}
      Cors__AllowedOrigins__1: ${CORS__ALLOWEDORIGINS__1:-}
      Cors__AllowedOrigins__2: ${CORS__ALLOWEDORIGINS__2:-}
    ports:
      - "8080:8080"
    volumes:
      - b2b_uploads:/app/wwwroot/uploads
    depends_on:
      - db
    restart: unless-stopped

volumes:
  b2b_mssql:
  b2b_uploads:

